name: Deploy to IIS Staging via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install lftp -y

      - name: FTP Deploy via lftp
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\";
            mirror -R -P 20 --parallel=20 --ignore-time --transfer-all ./dist/ '/rugbypremierleague/'
          "
